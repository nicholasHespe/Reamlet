<!DOCTYPE html>
<!-- PDFox — SPDX-License-Identifier: GPL-3.0-or-later -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- img-src includes data: to allow canvas.toDataURL() thumbnails -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' file:; script-src 'self' 'unsafe-eval' file:; style-src 'self' 'unsafe-inline'; worker-src blob: file:; img-src 'self' data: file:;" />
  <title>PDFox</title>
  <link rel="stylesheet" href="../assets/style.css" />
</head>
<body>
  <!-- ── Top toolbar: 3 flex sections ──────────────────────────── -->
  <div id="topbar">

    <!-- LEFT: annotation tools, right-aligned toward center -->
    <div id="tools-left">
      <button id="tool-select" class="tool-btn active" title="Select / Move (Esc)" data-tool="select">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M5 3l14 9-7 1.5-3.5 6.5z"/>
        </svg>
      </button>

      <button id="tool-draw" class="tool-btn" title="Draw (D)" data-tool="draw">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/>
        </svg>
      </button>

      <button id="tool-highlight" class="tool-btn" title="Highlight (H)" data-tool="highlight">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 3h6v13l-3 3-3-3V3z"/>
          <line x1="6" y1="21" x2="18" y2="21"/>
        </svg>
      </button>

      <button id="tool-text" class="tool-btn" title="Text box (T)" data-tool="text"
              style="font-weight:bold;font-size:17px;">T</button>

      <span class="sep"></span>

      <button id="tool-line" class="tool-btn" title="Line (L)" data-tool="line">
        <svg width="20" height="20" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="5" y1="19" x2="19" y2="5"/>
        </svg>
      </button>

      <button id="tool-rect" class="tool-btn" title="Rectangle (R)" data-tool="rect">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <rect x="3" y="5" width="18" height="14"/>
        </svg>
      </button>

      <button id="tool-oval" class="tool-btn" title="Oval (O)" data-tool="oval">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <ellipse cx="12" cy="12" rx="10" ry="7"/>
        </svg>
      </button>

      <button id="tool-arrow" class="tool-btn" title="Arrow (A)" data-tool="arrow">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="19" x2="19" y2="5"/>
          <polyline points="9 5 19 5 19 15"/>
        </svg>
      </button>

      <span class="sep"></span>

      <button id="tool-eraser" class="tool-btn" title="Eraser — drag to erase (E)" data-tool="eraser">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 20H7L3 16l13-13 7 7-3 3z"/>
          <path d="M6.5 17.5l4-4"/>
        </svg>
      </button>
    </div>

    <!-- CENTER: page navigation -->
    <div id="tools-center">
      <button id="btn-prev-page" title="Previous page">&#x2039;</button>
      <input  id="page-input" type="number" min="1" value="1" title="Jump to page" />
      <span   id="page-total">/ 1</span>
      <button id="btn-next-page" title="Next page">&#x203A;</button>
    </div>

    <!-- RIGHT: view + text formatting + colour picker, left-aligned toward center -->
    <div id="tools-right">
      <button id="btn-undo" title="Undo (Ctrl+Z)">&#x21A9;</button>
      <button id="btn-redo" title="Redo (Ctrl+Y)">&#x21AA;</button>
      <span class="sep"></span>

      <button id="btn-fit"    title="Fit Width (Ctrl+0)">&#x21D4;</button>
      <button id="btn-fit-h"  title="Fit Height">&#x21D5;</button>
      <button id="btn-rotate" title="Rotate 90° CW — Shift+click for current page only">&#x21BB;</button>
      <button id="btn-print"  title="Print (Ctrl+P)">&#x2399;</button>
      <span class="sep"></span>

      <button id="btn-bold"      title="Bold text">B</button>
      <button id="btn-underline" title="Underline text">U</button>
      <input  id="font-size-input" type="number" min="8" max="96" value="14" title="Font size (pt)" />
      <span class="sep"></span>

      <!-- Colour picker: single dot button → opens swatch panel -->
      <div id="color-picker-wrap">
        <button id="color-btn" title="Colour">
          <span id="color-dot"></span>
        </button>
        <div id="color-panel" class="hidden">
          <button class="swatch" data-color="#f5c518" style="background:#f5c518" title="Yellow"></button>
          <button class="swatch" data-color="#ff8c00" style="background:#ff8c00" title="Orange"></button>
          <button class="swatch" data-color="#ff3333" style="background:#ff3333" title="Red"></button>
          <button class="swatch" data-color="#cc44ff" style="background:#cc44ff" title="Purple"></button>
          <button class="swatch" data-color="#3388ff" style="background:#3388ff" title="Blue"></button>
          <button class="swatch" data-color="#00cc88" style="background:#00cc88" title="Green"></button>
          <button class="swatch" data-color="#111111" style="background:#111111" title="Black"></button>
          <button class="swatch" data-color="#ffffff" style="background:#ffffff" title="White"></button>
        </div>
      </div>

      <input id="thickness" type="range" min="1" max="20" value="3" title="Thickness" />
    </div>

  </div>

  <!-- ── Content area: sidebars overlay the viewer ─────────────── -->
  <div id="content-area">

    <!-- Viewer host fills the entire content area; pages always centred -->
    <div id="viewer-host">
      <div id="empty-state">
        <p>No file open.<br>Press <kbd>Ctrl+O</kbd> to open a PDF.</p>
      </div>
    </div>

    <!-- Left sidebar: permanent overlay -->
    <div id="sidebar">
      <div id="sidebar-header">
        <button class="sidebar-mode-btn active" data-mode="tabs" title="File Tabs">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="3" width="8" height="8"/><rect x="14" y="3" width="8" height="8"/>
            <rect x="2" y="14" width="8" height="8"/><rect x="14" y="14" width="8" height="8"/>
          </svg>
        </button>
        <button class="sidebar-mode-btn" data-mode="tools" title="Tools">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
          </svg>
        </button>
        <div id="sidebar-spacer"></div>
      </div>

      <div id="tab-bar" class="sidebar-panel active"></div>

      <div id="tools-panel" class="sidebar-panel">
        <button id="btn-combine" class="tool-panel-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/>
          </svg>
          Combine PDFs
        </button>
        <button id="btn-reorder" class="tool-panel-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <rect x="2" y="2" width="8" height="10"/><rect x="14" y="2" width="8" height="10"/>
            <rect x="2" y="16" width="8" height="6"/><rect x="14" y="16" width="8" height="6"/>
          </svg>
          Reorder Pages
        </button>
      </div>

      <!-- Drag handle on right edge -->
      <div class="resize-handle" id="sidebar-resize"></div>
    </div>

    <!-- Custom scrollbar: UI layer, repositions around toc-panel -->
    <div id="viewer-scrollbar"><div id="viewer-scrollbar-thumb"></div></div>

    <!-- TOC sidebar: right overlay, visible when PDF has an outline -->
    <div id="toc-panel" class="hidden">
      <div id="toc-header">
        <!-- Resize handle on left edge -->
        <div class="resize-handle" id="toc-resize"></div>
        <span id="toc-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="9" y1="6"  x2="20" y2="6"/>
            <line x1="9" y1="12" x2="20" y2="12"/>
            <line x1="9" y1="18" x2="20" y2="18"/>
            <circle cx="4" cy="6"  r="1.5" fill="currentColor" stroke="none"/>
            <circle cx="4" cy="12" r="1.5" fill="currentColor" stroke="none"/>
            <circle cx="4" cy="18" r="1.5" fill="currentColor" stroke="none"/>
          </svg>
        </span>
        <span id="toc-title">Contents</span>
      </div>
      <div id="toc-tree"></div>
    </div>

  </div>

  <!-- ── Combine modal ─────────────────────────────────────────── -->
  <div id="combine-modal" class="modal-overlay hidden">
    <div class="modal-box">
      <div class="modal-title">Combine PDFs</div>
      <p class="modal-hint">Click documents to add them in order. Click again to remove.</p>
      <div class="modal-body">
        <div id="combine-list"></div>
      </div>
      <div class="modal-footer">
        <button class="modal-btn" id="combine-cancel">Cancel</button>
        <button class="modal-btn primary" id="combine-ok">Combine</button>
      </div>
    </div>
  </div>

  <!-- ── Reorder modal ─────────────────────────────────────────── -->
  <div id="reorder-modal" class="modal-overlay hidden">
    <div class="modal-box" style="min-width:560px;">
      <div class="modal-title">Reorder Pages</div>
      <p class="modal-hint">Drag page thumbnails to reorder them.</p>
      <div class="modal-body">
        <div id="reorder-pages"></div>
      </div>
      <div class="modal-footer">
        <button class="modal-btn" id="reorder-cancel">Cancel</button>
        <button class="modal-btn primary" id="reorder-ok">Apply</button>
      </div>
    </div>
  </div>

  <!-- ── Close confirm modal ───────────────────────────────────── -->
  <div id="close-modal" class="modal-overlay hidden">
    <div class="modal-box" style="min-width:340px;">
      <div class="modal-title">Unsaved Changes</div>
      <p class="modal-hint" id="close-modal-msg"></p>
      <div class="modal-footer">
        <button class="modal-btn" id="close-cancel">Cancel</button>
        <button class="modal-btn" id="close-discard">Discard All</button>
        <button class="modal-btn primary" id="close-save">Save All</button>
      </div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
